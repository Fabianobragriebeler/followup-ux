<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Follow UP – UX Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
header{background:#fff;border-bottom:1px solid #d2d2d7;padding:16px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
header h1{font-size:18px;font-weight:600}
header span{font-size:13px;color:#6e6e73;background:#f5f5f7;padding:4px 10px;border-radius:20px;border:1px solid #d2d2d7}
#quarter-select{margin-left:auto;font-size:14px;padding:6px 12px;border-radius:8px;border:1px solid #d2d2d7;background:#fff;cursor:pointer}
main{max-width:1200px;margin:0 auto;padding:24px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #d2d2d7;background:#fff;font-size:13px;cursor:pointer;transition:all .15s}
.filter-btn.active,.filter-btn:hover{background:#0071e3;color:#fff;border-color:#0071e3}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:16px;border:1px solid #e5e5ea;text-align:center}
.stat-card .num{font-size:28px;font-weight:700}
.stat-card .lbl{font-size:12px;color:#6e6e73;margin-top:2px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{background:#fff;border-radius:14px;padding:18px;border:1px solid #e5e5ea;cursor:pointer;transition:box-shadow .15s;position:relative}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.10)}
.card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.status-dot.on-track{background:#30d158}
.status-dot.at-risk{background:#ff9f0a}
.status-dot.blocked{background:#ff3b30}
.status-dot.done{background:#636366}
.card-title{font-size:14px;font-weight:600;line-height:1.3}
.card-area{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;border:1px solid #d2d2d7;color:#6e6e73;margin-bottom:8px}
.card-owner{font-size:12px;color:#6e6e73;margin-top:6px}
.card-notes{font-size:12px;color:#444;margin-top:8px;line-height:1.5;max-height:60px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.status-badge{font-size:11px;padding:3px 8px;border-radius:8px;font-weight:500;margin-left:auto;white-space:nowrap}
.badge-on-track{background:#d1f4e0;color:#1c7c3e}
.badge-at-risk{background:#ffeacc;color:#996400}
.badge-blocked{background:#ffd4d4;color:#cc1515}
.badge-done{background:#e8e8ed;color:#3a3a3c}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:18px;padding:28px;max-width:600px;width:calc(100% - 32px);max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:#f5f5f7;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal h2{font-size:18px;font-weight:700;margin-bottom:4px;padding-right:40px}
.modal-meta{font-size:13px;color:#6e6e73;margin-bottom:16px}
.modal-section{margin-top:14px}
.modal-section h3{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#6e6e73;margin-bottom:6px}
.modal-section p{font-size:14px;line-height:1.6;color:#333}
.log-entry{font-size:12px;padding:6px 10px;border-radius:8px;background:#f5f5f7;margin-bottom:6px}
.log-entry .log-date{color:#6e6e73;font-size:11px}
.empty-state{text-align:center;padding:60px 20px;color:#6e6e73;font-size:15px}
</style>
</head>
<body>

  <select id="quarter-select" onchange="changeQuarter(this.value)">
    <option value="2026-Q2" selected>Q2 2026</option>
  </select>
</header>
<main>

  <div class="filters" id="filters"></div>
  <div class="cards" id="cards"></div>
</main>
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

function init(){
  seedData();
  renderStats();
  renderFilters();
  renderCards();
}

function changeQuarter(q){
  currentQuarter=q;
  activeFilter='all';
  renderStats();
  renderFilters();
  renderCards();
}

function getPs(){return (projects[currentQuarter]||[]).filter(p=>activeFilter==='all'||p.areas.includes(activeFilter)||activeFilter===p.status);}

function renderStats(){
  const ps=projects[currentQuarter]||[];
  const byStatus={};
  ps.forEach(p=>{byStatus[p.status]=(byStatus[p.status]||0)+1;});
  const el=document.getElementById('stats');
  el.innerHTML=`
    <div class="stat-card"><div class="num">${ps.length}</div><div class="lbl">Total</div></div>
    <div class="stat-card"><div class="num" style="color:#30d158">${byStatus['On Track']||0}</div><div class="lbl">On Track</div></div>
    <div class="stat-card"><div class="num" style="color:#ff9f0a">${byStatus['At Risk']||0}</div><div class="lbl">At Risk</div></div>
    <div class="stat-card"><div class="num" style="color:#ff3b30">${byStatus['Blocked']||0}</div><div class="lbl">Blocked</div></div>
    <div class="stat-card"><div class="num" style="color:#636366">${byStatus['Done']||0}</div><div class="lbl">Done</div></div>
  `;
}

function renderFilters(){
  const ps=projects[currentQuarter]||[];
  const areas=[...new Set(ps.flatMap(p=>p.areas))].sort();
  const el=document.getElementById('filters');
  const all=[{v:'all',l:'Todos'},
    ...areas.map(a=>({v:a,l:a})),
    {v:'On Track',l:'On Track'},{v:'At Risk',l:'At Risk'},{v:'Blocked',l:'Blocked'},{v:'Done',l:'Done'}
  ];
  el.innerHTML=all.map(f=>`<button class="filter-btn ${activeFilter===f.v?'active':''}" onclick="setFilter('${f.v}')">${f.l}</button>`).join('');
}

function setFilter(f){activeFilter=f;renderFilters();renderCards();}

function statusClass(s){return s.toLowerCase().replace(' ','-');}
function badgeClass(s){return 'badge-'+s.toLowerCase().replace(' ','-');}

function renderCards(){
  const ps=getPs();
  const el=document.getElementById('cards');
  if(!ps.length){el.innerHTML='<div class="empty-state">No hay proyectos para mostrar.</div>';return;}
  el.innerHTML=ps.map((p,i)=>`
    <div class="card" onclick="openModal(${projects[currentQuarter].indexOf(p)})">
      <div class="card-header">
        <div class="status-dot ${statusClass(p.status)}"></div>
        <div class="card-title">${escHtml(p.name)}</div>
        <span class="status-badge ${badgeClass(p.status)}">${escHtml(p.status)}</span>
      </div>
      <span class="card-area">${escHtml(p.areas[0]||'')}</span>
      ${p.notes?`<div class="card-notes">${escHtml(p.notes)}</div>`:''}
      <div class="card-owner">👤 ${escHtml(p.owner||'')}</div>
    </div>
  `).join('');
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function openModal(idx){
  const p=(projects[currentQuarter]||[])[idx];
  if(!p)return;
  document.getElementById('modal-content').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <div class="status-dot ${statusClass(p.status)}" style="width:12px;height:12px"></div>
      <h2 style="margin:0;font-size:18px">${escHtml(p.name)}</h2>
    </div>
    <div class="modal-meta">
      <span class="status-badge ${badgeClass(p.status)}">${escHtml(p.status)}</span>
      &nbsp;•&nbsp; ${escHtml(p.areas.join(', '))}
      &nbsp;•&nbsp; ${escHtml(p.startDate)} → ${escHtml(p.endDate)}
    </div>
    ${p.owner?`<div class="modal-section"><h3>Owner</h3><p>${escHtml(p.owner)}</p></div>`:''}
    ${p.notes?`<div class="modal-section"><h3>Notas</h3><p>${escHtml(p.notes)}</p></div>`:''}
    ${p.log&&p.log.length?`<div class="modal-section"><h3>Log</h3>${p.log.map(l=>`<div class="log-entry"><span class="log-date">${escHtml(l.date||'')}</span> – ${escHtml(l.msg||'')} <strong>[${escHtml(l.status||'')}]</strong></div>`).join('')}</div>`:''}
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

init();
</script>
</body>
</html>
